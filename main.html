<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>

<link href="src/output.css" rel="stylesheet">

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<nav class="bg-white border-b">
<div class="max-w-7xl mx-auto flex items-center justify-between p-4">

<div class="flex items-center gap-2 font-semibold text-lg">
<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
<path d="M12 0C5.37 0 0 5.37 0 12a12 12 0 008.2 11.4c.6.1.8-.2.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.2-1.2-1.5-1.2-1.5-1-.7.1-.7.1-.7 1.1.1 1.7 1.1 1.7 1.1 1 .1.7 1.7 2.7 2.1.1-.7.4-1.2.7-1.5-2.7-.3-5.6-1.4-5.6-6a4.7 4.7 0 011.2-3.2c-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2A11.5 11.5 0 0112 6c1 0 2 .1 3 .4 2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.9.1 3.2a4.7 4.7 0 011.2 3.2c0 4.6-2.9 5.6-5.6 6 .4.3.8 1 .8 2v3c0 .4.2.7.8.6A12 12 0 0024 12c0-6.6-5.4-12-12-12z"/>
</svg>

GitHub Issues Tracker
</div>

<div class="flex items-center gap-3">

<input id="searchInput"
type="text"
placeholder="Search issues..."
class="border rounded px-3 py-1 text-sm w-64">

<button class="bg-purple-600 text-white px-4 py-1 rounded text-sm">
+ New Issue
</button>

</div>

</div>
</nav>

<!-- MAIN -->

<div class="max-w-7xl mx-auto p-6">

<!-- TABS -->

<div class="bg-white p-4 rounded shadow mb-6">

<div class="flex gap-3">

<button data-tab="all"
class="tabBtn bg-purple-600 text-white px-4 py-1 rounded">
All
</button>

<button data-tab="open"
class="tabBtn bg-gray-200 px-4 py-1 rounded">
Open
</button>

<button data-tab="closed"
class="tabBtn bg-gray-200 px-4 py-1 rounded">
Closed
</button>

</div>

</div>

<!-- ISSUE HEADER -->

<div class="flex justify-between items-center mb-4">

<h2 class="text-lg font-semibold">
<span id="issueCount">0</span> Issues
</h2>

<div class="flex gap-4 text-sm">
<span class="flex items-center gap-1">
<span class="w-2 h-2 bg-green-500 rounded-full"></span> Open
</span>

<span class="flex items-center gap-1">
<span class="w-2 h-2 bg-purple-500 rounded-full"></span> Closed
</span>
</div>

</div>

<!-- ISSUE GRID -->

<div id="issuesContainer"
class="grid md:grid-cols-2 lg:grid-cols-4 gap-4">
</div>

</div>

<script src="issues.js"></script>

</body>
</html>
