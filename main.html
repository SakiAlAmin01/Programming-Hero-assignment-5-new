<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<link href="src/output.css" rel="stylesheet">

</head>

<body class="bg-gray-100">


<!-- NAVBAR -->

<nav class="bg-white border-b">

<div class="max-w-7xl mx-auto flex items-center justify-between p-4">

<div class="font-semibold text-lg">
GitHub Issues Tracker
</div>

<div class="flex items-center gap-3">

<input
id="searchInput"
type="text"
placeholder="Search issues..."
class="border rounded px-3 py-1 text-sm w-64"
/>

<button class="bg-purple-600 text-white px-4 py-1 rounded text-sm">
+ New Issue
</button>

</div>

</div>

</nav>


<!-- MAIN -->

<div class="max-w-7xl mx-auto p-6">


<!-- TABS -->

<div class="bg-white p-4 rounded shadow mb-4">

<div class="flex gap-3">

<button data-tab="all"
class="tabBtn bg-purple-600 text-white px-4 py-1 rounded">
All
</button>

<button data-tab="open"
class="tabBtn bg-gray-200 px-4 py-1 rounded">
Open
</button>

<button data-tab="closed"
class="tabBtn bg-gray-200 px-4 py-1 rounded">
Closed
</button>

</div>

</div>


<!-- ISSUE COUNT -->

<h2 class="text-lg font-semibold mb-4 flex items-center gap-2">

<span class="bg-purple-100 p-2 rounded-full">🛠</span>

<span id="issueCount">0</span> Issues

<div class="ml-auto flex gap-4 text-sm">

<div class="flex items-center gap-1">
<span class="w-2 h-2 bg-green-500 rounded-full"></span>
Open
</div>

<div class="flex items-center gap-1">
<span class="w-2 h-2 bg-purple-500 rounded-full"></span>
Closed
</div>

</div>

</h2>


<!-- ISSUE GRID -->

<div
id="issuesContainer"
class="grid md:grid-cols-2 lg:grid-cols-4 gap-4">
</div>


</div>



<!-- MODAL -->

<div id="issueModal"
class="fixed inset-0 bg-black/40 hidden items-center justify-center">

<div class="bg-white w-[500px] rounded-lg p-6">

<h2 id="modalTitle"
class="text-xl font-bold mb-2"></h2>

<div class="flex gap-2 mb-3 text-sm">

<span id="modalStatus"
class="bg-green-500 text-white px-2 py-1 rounded"></span>

<span id="modalAuthor" class="text-gray-500"></span>

<span id="modalDate" class="text-gray-500"></span>

</div>

<div class="flex gap-2 mb-3">

<span id="modalLabel1"
class="text-xs px-2 py-1 rounded bg-red-100 text-red-600"></span>

<span id="modalLabel2"
class="text-xs px-2 py-1 rounded bg-yellow-100 text-yellow-600"></span>

</div>

<p id="modalDesc"
class="text-gray-600 mb-4"></p>

<div class="grid grid-cols-2 mb-4">

<div>

<p class="text-gray-500 text-sm">
Assignee
</p>

<p id="modalAssignee"></p>

</div>

<div>

<p class="text-gray-500 text-sm">
Priority
</p>

<span id="modalPriority"
class="bg-red-500 text-white px-2 py-1 rounded text-xs"></span>

</div>

</div>

<button onclick="closeModal()"
class="bg-purple-600 text-white px-4 py-2 rounded">
Close
</button>

</div>

</div>


<script src="issue.js"></script>

</body>
</html>
