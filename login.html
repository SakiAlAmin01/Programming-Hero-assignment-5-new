<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>
<link href="src/output.css" rel="stylesheet">
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">

<div class="bg-white w-full max-w-md p-8 rounded-xl shadow-lg">

<div class="text-center mb-6">
<h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
<p class="text-gray-500 text-sm">Sign in to manage your issues</p>
</div>

<form id="loginForm">

<label class="block mb-2 font-medium">Username</label>
<input id="username" type="text"
class="w-full border rounded-lg p-3 mb-4"
placeholder="Enter Username">

<label class="block mb-2 font-medium">Password</label>
<input id="password" type="password"
class="w-full border rounded-lg p-3 mb-4"
placeholder="Enter Password">

<p id="error" class="text-red-500 text-sm mb-3 hidden">
Invalid username or password
</p>

<button
type="submit"
class="w-full bg-purple-600 text-white py-3 rounded-lg hover:bg-purple-700 transition">
Sign In
</button>

</form>

<div class="text-center mt-6 text-sm text-gray-500">
Demo Credentials:<br>
Username: <b>admin</b><br>
Password: <b>admin123</b>
</div>

</div>

<script src="login.js"></script>

</body>
</html>
